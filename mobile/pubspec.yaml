name: pratibimb_ai
description: PratibimbAI - Educational 3D Engine Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  
  # WebView for R3F Engine
  flutter_inappwebview: ^6.0.0
  webview_flutter: ^4.4.2
  
  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9
  
  # HTTP Client
  dio: ^5.4.0
  http: ^1.1.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # JSON Handling
  json_annotation: ^4.8.1
  
  # Utilities
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  flutter_tts: ^4.0.2
  
  # Animations
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  
  # Glassmorphism Effects
  glassmorphism: ^3.0.0
  blur: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/www/
    - assets/www/js/
    - assets/icons/
    - assets/animations/
  
