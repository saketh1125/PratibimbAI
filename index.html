<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover'>
    <meta name="theme-color" content="#0f0a1e" />
    <meta name="description" content="PratibimbAI - Educational 3D Engine for Mobile Learning" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>PratibimbAI - Educational 3D Engine</title>
    <style>
      /* ================================================
         PRATIBIMBAI - PREMIUM GLASSMORPHIC UI STYLES
         International Tech Competition Grade Design
         ================================================ */
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      :root {
        /* Rich Dark Theme - Taj Mahal Palette */
        --bg-deep: #0f0a1e;
        --bg-surface: rgba(15, 10, 30, 0.85);
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --glass-shadow: rgba(0, 0, 0, 0.3);
        
        /* Accent Colors */
        --gold: #ffd700;
        --gold-glow: rgba(255, 215, 0, 0.3);
        --neon-indigo: #7c3aed;
        --neon-indigo-glow: rgba(124, 58, 237, 0.4);
        --cyan: #06b6d4;
        --cyan-glow: rgba(6, 182, 212, 0.3);
        
        /* Status Colors */
        --success: #22c55e;
        --warning: #f59e0b;
        --error: #ef4444;
        
        /* Typography */
        --font-main: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      }
      
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: var(--font-main);
        background: var(--bg-deep);
        color: white;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      .app {
        width: 100%;
        height: 100%;
        position: relative;
      }
      
      canvas {
        display: block;
        touch-action: none;
      }
      
      /* ============================================
         GLASSMORPHIC PANEL STYLES
         ============================================ */
      
      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        box-shadow: 
          0 8px 32px var(--glass-shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      .glass-panel:hover {
        border-color: rgba(255, 255, 255, 0.15);
        box-shadow: 
          0 12px 40px var(--glass-shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.15),
          0 0 30px var(--neon-indigo-glow);
      }
      
      /* ============================================
         UI OVERLAY
         ============================================ */
      
      .ui-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        padding: 20px;
        display: flex;
        flex-direction: column;
        z-index: 100;
      }
      
      .ui-overlay > * {
        pointer-events: auto;
      }
      
      /* ============================================
         GPU INFO PANEL
         ============================================ */
      
      .gpu-panel {
        position: absolute;
        top: 20px;
        left: 20px;
        padding: 16px 20px;
        min-width: 220px;
      }
      
      .panel-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        font-weight: 600;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: rgba(255, 255, 255, 0.7);
      }
      
      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }
      
      .status-dot.active {
        background: var(--success);
        box-shadow: 0 0 10px var(--success);
      }
      
      .status-dot.checking {
        background: var(--warning);
        box-shadow: 0 0 10px var(--warning);
      }
      
      .status-dot.error, .status-dot.fallback {
        background: var(--error);
        box-shadow: 0 0 10px var(--error);
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.1); }
      }
      
      .gpu-info {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      
      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
      }
      
      .info-row .label {
        color: rgba(255, 255, 255, 0.5);
      }
      
      .info-row .value {
        color: rgba(255, 255, 255, 0.9);
        font-family: var(--font-mono);
        font-size: 11px;
        max-width: 140px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      
      .info-row .value.fps {
        color: var(--success);
        font-weight: 600;
      }
      
      /* ============================================
         SCENE INFO PANEL
         ============================================ */
      
      .scene-info-panel {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 20px 24px;
        max-width: 280px;
        text-align: right;
      }
      
      .scene-info-panel h2 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 6px;
        background: linear-gradient(135deg, var(--gold), #fff, var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      .scene-info-panel p {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 12px;
      }
      
      .scene-info-panel .stats {
        display: flex;
        gap: 16px;
        justify-content: flex-end;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
      }
      
      .scene-info-panel .stats strong {
        color: var(--cyan);
        font-weight: 600;
      }
      
      /* ============================================
         CONTROL PANEL
         ============================================ */
      
      .control-panel {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        padding: 12px 16px;
      }
      
      .control-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 12px 20px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: rgba(255, 255, 255, 0.7);
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: var(--font-main);
        font-size: 11px;
      }
      
      .control-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
        color: white;
      }
      
      .control-btn.active {
        background: var(--neon-indigo-glow);
        border-color: var(--neon-indigo);
        color: white;
      }
      
      .control-btn .icon {
        font-size: 18px;
      }
      
      /* ============================================
         BRANDING
         ============================================ */
      
      .branding {
        position: absolute;
        bottom: 20px;
        right: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 18px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 30px;
      }
      
      .branding .logo {
        font-size: 20px;
        color: var(--gold);
        text-shadow: 0 0 20px var(--gold-glow);
      }
      
      .branding .name {
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.5px;
        background: linear-gradient(90deg, white, var(--cyan));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      .branding .version {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.4);
        font-family: var(--font-mono);
      }
      
      /* ============================================
         JSON EDITOR
         ============================================ */
      
      .editor-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 20px;
      }
      
      .json-editor {
        width: 100%;
        max-width: 800px;
        max-height: 80vh;
        display: flex;
        flex-direction: column;
        padding: 24px;
      }
      
      .editor-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      
      .editor-header h3 {
        font-size: 18px;
        font-weight: 600;
        color: white;
      }
      
      .close-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }
      
      .close-btn:hover {
        background: var(--error);
        border-color: var(--error);
      }
      
      .error-message {
        background: rgba(239, 68, 68, 0.2);
        border: 1px solid var(--error);
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 12px;
        font-size: 13px;
        color: #fca5a5;
      }
      
      .json-editor textarea {
        flex: 1;
        min-height: 400px;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 16px;
        color: #e2e8f0;
        font-family: var(--font-mono);
        font-size: 12px;
        line-height: 1.6;
        resize: none;
        outline: none;
        transition: border-color 0.2s;
      }
      
      .json-editor textarea:focus {
        border-color: var(--neon-indigo);
      }
      
      .editor-actions {
        display: flex;
        gap: 12px;
        margin-top: 16px;
        justify-content: flex-end;
      }
      
      .editor-actions button {
        padding: 12px 24px;
        border-radius: 10px;
        font-family: var(--font-main);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }
      
      .editor-actions button:hover {
        background: rgba(255, 255, 255, 0.15);
      }
      
      .editor-actions button.primary {
        background: linear-gradient(135deg, var(--neon-indigo), #9333ea);
        border: none;
      }
      
      .editor-actions button.primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px var(--neon-indigo-glow);
      }
      
      /* ============================================
         LOADING STATES
         ============================================ */
      
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--bg-deep);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
      }
      
      .loading-content {
        text-align: center;
      }
      
      .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--gold);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .loading-screen {
        text-align: center;
        color: white;
        padding: 40px;
      }
      
      .loading-logo {
        margin-bottom: 30px;
      }
      
      .loading-logo .logo-icon {
        font-size: 48px;
        color: var(--gold);
        text-shadow: 0 0 40px var(--gold-glow);
        margin-bottom: 16px;
        animation: float 3s ease-in-out infinite;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      
      .loading-logo h1 {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 2px;
        background: linear-gradient(135deg, white, var(--cyan), var(--gold));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      .loading-logo .tagline {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.5);
        margin-top: 8px;
      }
      
      .loading-bar-container {
        width: 200px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
        margin: 0 auto 16px;
      }
      
      .loading-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--neon-indigo), var(--cyan));
        border-radius: 2px;
        transition: width 0.3s ease;
      }
      
      .loading-text {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.4);
      }
      
      /* ============================================
         MOBILE RESPONSIVENESS
         ============================================ */
      
      @media (max-width: 768px) {
        .ui-overlay {
          padding: 12px;
        }
        
        .gpu-panel {
          top: 12px;
          left: 12px;
          padding: 12px 16px;
          min-width: 180px;
        }
        
        .scene-info-panel {
          top: 12px;
          right: 12px;
          padding: 14px 18px;
          max-width: 200px;
        }
        
        .scene-info-panel h2 {
          font-size: 18px;
        }
        
        .control-panel {
          bottom: 80px;
          padding: 10px 12px;
        }
        
        .control-btn {
          padding: 10px 16px;
        }
        
        .branding {
          bottom: 12px;
          right: 12px;
          padding: 10px 14px;
        }
        
        .json-editor {
          padding: 16px;
        }
        
        .json-editor textarea {
          min-height: 300px;
          font-size: 11px;
        }
      }
      
      /* ============================================
         SELECTION & FOCUS STYLES
         ============================================ */
      
      ::selection {
        background: var(--neon-indigo);
        color: white;
      }
      
      :focus-visible {
        outline: 2px solid var(--neon-indigo);
        outline-offset: 2px;
      }
      
      /* Scrollbar Styles */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      
      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 4px;
      }
      
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
